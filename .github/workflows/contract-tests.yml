name: contract-tests

# Contract tests are CPU-only: they import gonka_poc + vllm and assert that the
# vllm surfaces we depend on (engine args, model runner, sampler hooks, etc.)
# still exist with the expected shape. No GPU work is invoked.

on:
  push:
    branches: [main]
    paths-ignore:
      - "**/*.md"
      - "docs/**"
      - "LICENSE"
  pull_request:
    paths-ignore:
      - "**/*.md"
      - "docs/**"
      - "LICENSE"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: contract-tests-${{ github.ref }}
  cancel-in-progress: true

jobs:
  contract:
    name: contract (py3.11, vllm ${{ matrix.vllm }})
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        # vLLM RC tags exist on GitHub but are NOT published to PyPI — only
        # stable releases land on PyPI (verified 2026-06-16: index ends at
        # 0.23.0). Keep the matrix to published-on-PyPI versions only; add
        # new entries when 0.23.1, 0.23.2, etc. ship.
        vllm:
          - "0.23.0"
          - "0.25.1"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: "pyproject.toml"

      - name: Upgrade pip
        run: python -m pip install --upgrade pip

      - name: Install vllm==${{ matrix.vllm }}
        # Pin vllm explicitly so the matrix entry — not the >=0.23,<0.24 range
        # in pyproject — picks the version under test.
        run: python -m pip install "vllm==${{ matrix.vllm }}"

      - name: Install gonka-poc with test extras
        run: python -m pip install -e ".[test]"

      - name: Run contract tests
        run: pytest tests/contract tests/unit -v --tb=short

  smoke-help:
    # Real-wheel smoke. The contract-tests job above asserts that named
    # vllm symbols exist; this job asserts that the gonka-vllm-serve CLI
    # actually composes against the real vllm wheel end-to-end. It catches
    # the "import path wrong, contract test enshrined the wrong path" class
    # of bugs flagged in v3 review on ``cli_env_setup`` (the contract test
    # mirrored the same import string the production code uses, so a
    # wrong-path bug in production was invisible to the test).
    #
    # We exercise three import surfaces:
    #   1. ``gonka-vllm-serve --help`` -- full CLI bring-up (cli_env_setup
    #      import + make_arg_parser + our --gonka-poc-* extension).
    #   2. ``gonka_poc.entrypoint.api_router.main`` -- API server entry.
    #   3. ``gonka_poc.worker.extension.PoCWorkerExtension`` -- worker mixin
    #      path used by ``--worker-extension-cls``.
    name: smoke-help (py3.11, vllm ${{ matrix.vllm }})
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        # Mirror the contract job's matrix exactly so both gates trip on
        # the same vllm minor when upstream layout drifts.
        vllm:
          - "0.23.0"
          - "0.25.1"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: "pyproject.toml"

      - name: Upgrade pip
        run: python -m pip install --upgrade pip

      - name: Install vllm==${{ matrix.vllm }}
        run: python -m pip install "vllm==${{ matrix.vllm }}"

      - name: Install gonka-poc with test extras
        run: python -m pip install -e ".[test]"

      - name: gonka-vllm-serve console-script discovery
        # The console-script must resolve to our entrypoint module. Catches
        # pyproject ``[project.scripts]`` regressions where the wheel ships
        # without the binary, OR the binary resolves to a stale module.
        #
        # We intentionally do NOT invoke ``gonka-vllm-serve --help`` here:
        # vLLM 0.23's ``make_arg_parser`` instantiates a full ``VllmConfig``
        # (incl. ``DeviceConfig``) just to enumerate kwargs, and
        # ``DeviceConfig.__post_init__`` raises ``RuntimeError("Failed to
        # infer device type")`` on bare ubuntu-latest (no CUDA driver,
        # CUDA-built wheel). Forcing a GPU runner only for ``--help`` would
        # be a poor-ROI gate; we cover the underlying import composition
        # below, which is the actual v3-review signal.
        run: |
          which gonka-vllm-serve
          python -c "
          from importlib.metadata import entry_points
          eps = entry_points(group='console_scripts')
          serve = [e for e in eps if e.name == 'gonka-vllm-serve']
          assert serve, 'gonka-vllm-serve console-script not registered'
          ep = serve[0]
          assert ep.value.startswith('gonka_poc.entrypoint.api_router'), (
              f'console-script resolves to wrong module: {ep.value}'
          )
          print(f'gonka-vllm-serve -> {ep.value} OK')
          "

      - name: import gonka_poc.entrypoint.api_router.main
        run: python -c "from gonka_poc.entrypoint.api_router import main; print('main import OK')"

      - name: import gonka_poc.worker.extension.PoCWorkerExtension
        run: python -c "from gonka_poc.worker.extension import PoCWorkerExtension; print('worker ext import OK')"

      - name: import cli_env_setup from current vllm
        # The original ``--help`` step was meant to surface ``cli_env_setup``
        # import drift specifically (v3 review caught a wrong-path bug here).
        # Reproduce that signal without the GPU-only argparse builder: import
        # the symbol directly and assert callability. Mirrors the lookup in
        # ``api_router.main()``.
        run: |
          python -c "
          from vllm.entrypoints.serve.utils.api_utils import cli_env_setup
          assert callable(cli_env_setup), 'cli_env_setup is not callable'
          print('cli_env_setup import OK')
          "

      - name: import gonka_poc.poc.* (runtime-dep coverage)
        # Closes v4 must-fix #3 (MAJOR): the smoke-help job previously had
        # ZERO coverage of the ``gonka_poc.poc`` subpackage, so missing
        # runtime deps that the poc.* modules transitively require
        # (e.g. fix-A's scipy / aiohttp regression) slipped through CI.
        #
        # Each line below probes a distinct dep-surface:
        #   * ``poc.routes`` / ``poc.data`` / ``poc.callbacks`` -- the three
        #     poc submodules touched by the API router on startup.
        #   * ``poc.data.fraud_test`` -- pulls scipy (statistical fraud
        #     tests). A missing scipy dep raises ModuleNotFoundError here.
        #   * ``poc.callbacks.CallbackSender`` -- pulls aiohttp (async HTTP
        #     client for PoC callbacks). A missing aiohttp dep raises
        #     ModuleNotFoundError here.
        run: |
          python -c "from gonka_poc.poc import routes, data, callbacks; print('poc imports OK')"
          python -c "from gonka_poc.poc.data import fraud_test; print('data.fraud_test OK')"
          python -c "from gonka_poc.poc.callbacks import CallbackSender; print('callbacks.CallbackSender OK')"

      - name: vllm.general_plugins entry-point discovery + invocation
        # Closes v4 must-fix #3 (MAJOR): the smoke-help job previously had
        # ZERO coverage of the plugin entry-point. ``gonka-vllm-serve`` was
        # smoke-tested, but plain ``vllm serve`` users rely on vLLM
        # enumerating ``entry_points(group='vllm.general_plugins')`` and
        # loading our ``gonka_poc.plugin:register`` -- a pyproject typo or
        # a wheel-packaging regression would silently disable the gating
        # warning + PLUGIN_LOADED flag in production.
        #
        # The probe enumerates the entry-point group, asserts the entry
        # exists with the expected target string, .load()s it, and invokes
        # it twice to verify the idempotency guard in
        # ``gonka_poc.plugin.register`` (``_registered`` module-global).
        run: |
          python -c "
          from importlib.metadata import entry_points
          eps = list(entry_points(group='vllm.general_plugins'))
          ep = next((e for e in eps if e.name == 'gonka_poc'), None)
          assert ep is not None, f'gonka_poc entry-point not registered; got: {[e.name for e in eps]}'
          assert ep.value == 'gonka_poc.plugin:register', f'Wrong target: {ep.value}'
          register = ep.load()
          assert callable(register), 'register is not callable after entry-point load'
          register()  # first call -- sets _registered=True, may wrap build_app
          register()  # second call -- must hit idempotency guard and no-op
          print('entry-point: gonka_poc -> gonka_poc.plugin:register OK + invocation OK')
          "
